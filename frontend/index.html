<!DOCTYPE html>
<html>
<head><title>CORE006 Upload</title></head>
<body>
    <h1>CORE006 Upload Portal</h1>
    <form action="https://solynsworld.onrender.com/upload" method="POST" enctype="multipart/form-data">
        <label>Title:</label> <input type="text" name="title"><br>
        <label>Description:</label><br> <textarea name="description"></textarea><br>
        <label>Tags (comma separated):</label> <input type="text" name="tags"><br>
        <label>Select Files:</label> <input type="file" name="file" multiple><br>
        <input type="submit" value="Upload">
    </form>
</body>
</html>
